apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

// Location of release keystore - check env var first, then fallback to local path
def keystorePath = System.getenv("KEYSTORE_PATH") ?: '../release.keystore'
def releaseKeystoreFile = file(keystorePath)

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    autolinkLibrariesWithApp()

    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '..'
    // root = file("../")
    //   The folder where the react-native NPM package is. Default is ../node_modules/react-native
    // reactNativeDir = file("../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../node_modules/@react-native/codegen
    // codegenDir = file("../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../node_modules/react-native/cli.js
    // cliFile = file("../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]
}

apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"

// Ensure lint vital generation waits for vector icon fonts to be copied
tasks.configureEach { task ->
    if (task.name == "generateReleaseLintVitalReportModel") {
        task.dependsOn("copyReactNativeVectorIconFonts")
    }
}


/**
 * Run Proguard to shrink the Java bytecode in release builds.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore.
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US.  Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'


/**
 * Architectures to build native code for in debug.
 */
def nativeArchitectures = project.getProperties().get("reactNativeDebugArchitectures")

android {
    namespace "inc.ajna.esse"
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion
    externalNativeBuild {
        cmake {
            version "3.22.1"
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId "inc.ajna.esse"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 29
        versionName "29"

        missingDimensionStrategy 'react-native-camera', 'general'

        // 16KB page size alignment for Android 15+
        // Only arm64-v8a for production (x86_64 libs don't support 16KB pages)
        ndk {
            abiFilters "arm64-v8a"
        }
        externalNativeBuild {
            cmake {
                cppFlags "-Wl,-z,max-page-size=16384"
            }
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {   
            storeFile releaseKeystoreFile
            storePassword System.getenv("KEYSTORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }
    // Fallback to debug signing when a local release keystore is not available
    def useDebugSigningForRelease = !releaseKeystoreFile.exists()
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            if (nativeArchitectures) {
                ndk {
                    abiFilters nativeArchitectures.split(',')
                }
            }
        }
        release {
            signingConfig useDebugSigningForRelease ? signingConfigs.debug : signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    // Fix for RN 0.76+ duplicate native libraries from native modules
    packagingOptions {
        pickFirst '**/libreactnative.so'
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
        pickFirst '**/libjsi.so'
        pickFirst '**/libreact_featureflagsjni.so'
        pickFirst '**/libreact_newarchdefaults.so'

        // Exclude non-compliant architectures for 16KB page alignment (Android 15+)
        // Only arm64-v8a libraries support 16KB pages from all dependencies
        exclude '**/armeabi-v7a/**'
        exclude '**/x86/**'
        exclude '**/x86_64/**'
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    // JNA is provided by @ajna-inc/poe-proofs
    // implementation 'net.java.dev.jna:jna:5.2.0'
    
    implementation "androidx.swiperefreshlayout:swiperefreshlayout:1.0.0"

    // Updated for 16KB page alignment support (Android 15+)
    implementation 'com.google.mlkit:barcode-scanning:17.3.0'
    implementation 'androidx.camera:camera-core:1.4.2'

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// react-native-config: force absolute `.env` next to package.json so Gradle always loads it
// (dotenv.gradle falls back to `new File(envFile)` when the first path misses).
def walletDotEnvFile = file("${project.projectDir}/../../.env")
if (walletDotEnvFile.exists()) {
    System.setProperty('ENVFILE', walletDotEnvFile.absolutePath)
}

apply from: project(':react-native-config').projectDir.getPath() + "/dotenv.gradle"

// Read WALLET_THEME from the same .env file on disk (last matching line wins). Using this for
// native resources avoids stale values when Gradle configuration cache / plugin order leaves
// splash overlay or launcher icon on the wrong theme after you change .env.
def readWalletThemeForResFromFile = { File envFile ->
    if (envFile == null || !envFile.exists()) {
        return 'essiwallet'
    }
    def theme = 'essiwallet'
    envFile.eachLine { String line ->
        def trimmed = line.trim()
        if (trimmed.isEmpty() || trimmed.startsWith('#')) {
            return
        }
        def m = trimmed =~ /^WALLET_THEME\s*=\s*(.+)$/
        if (!m.find()) {
            return
        }
        def v = m.group(1).trim()
        if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) {
            v = v.substring(1, v.length() - 1)
        }
        theme = v.toLowerCase()
    }
    return theme
}

def walletThemeForRes = readWalletThemeForResFromFile(walletDotEnvFile)
// VeriDID-only overlay (splash + API 31 theme). ESSI matches master: @mipmap/ic_launcher, no custom splash overlay.
def splashResOverlayDir =
    walletThemeForRes.contains('veridid') ? 'res-splash-veridid' : null

android {
    defaultConfig {
        def displayName = project.env.get('APP_DISPLAY_NAME') ?: 'ESSI Wallet'
        resValue 'string', 'app_launcher_name', "\"${displayName.replaceAll('%', '\\\\u0025')}\""
        def theme = walletThemeForRes
        def explicit = project.env.get('ANDROID_LAUNCHER_MIPMAP')
        def mipmapBase =
            explicit
                ?: (theme.contains('veridid') ? 'ic_launcher_veridid' : 'ic_launcher')
        manifestPlaceholders.androidLauncherIconMipmap = "@mipmap/${mipmapBase}"
        manifestPlaceholders.androidLauncherRoundIconMipmap = "@mipmap/${mipmapBase}"
    }
}

// Append VeriDID splash resources after other plugins configure sourceSets (last srcDir wins merges).
afterEvaluate {
    if (splashResOverlayDir == null) {
        return
    }
    def splashDir = file("${project.projectDir}/src/main/${splashResOverlayDir}").canonicalFile
    def resDirs = android.sourceSets.main.res.srcDirs
    def already = resDirs.any { it.canonicalFile == splashDir }
    if (!already) {
        android.sourceSets.main.res.srcDirs += splashDir
    }
}

// Force dependency versions for 16KB page alignment support (Android 15+)
configurations.all {
    resolutionStrategy {
        force 'com.lambdapioneer.argon2kt:argon2kt:1.6.0'
        force 'com.google.mlkit:barcode-scanning:17.3.0'
        force 'net.java.dev.jna:jna:5.14.0'
        force 'androidx.camera:camera-core:1.4.2'
        force 'androidx.camera:camera-camera2:1.4.2'
        force 'androidx.camera:camera-lifecycle:1.4.2'
        force 'androidx.camera:camera-view:1.4.2'
    }
}
